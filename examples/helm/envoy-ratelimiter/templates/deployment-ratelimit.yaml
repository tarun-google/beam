apiVersion: apps/v1
kind: Deployment
metadata:
  name: ratelimit
  namespace: {{ .Values.namespace }}
  labels:
    app: ratelimit
spec:
  replicas: {{ .Values.ratelimit.replicas }}
  selector:
    matchLabels:
      app: ratelimit
  template:
    metadata:
      labels:
        app: ratelimit
    spec:
      containers:
      - name: ratelimit
        image: {{ .Values.ratelimit.image }}
        command: ["/bin/ratelimit"]
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 8081
          name: grpc
        - containerPort: 6070
          name: debug
        {{- if .Values.enableMetrics }}
        - containerPort: 9090
          name: metrics
        {{- end }}
        env:
        - name: USE_PROMETHEUS
          value: {{ .Values.enableMetrics | quote }}
        {{- if .Values.enableMetrics }}
        - name: PROMETHEUS_ADDR
          value: ":9090"
        - name: PROMETHEUS_PATH
          value: "/metrics"
        {{- end }}
        - name: USE_STATSD
          value: "false"
        - name: DISABLE_STATS
          value: {{ not .Values.enableMetrics | quote }}
        - name: LOG_FORMAT
          value: "json"
        - name: LOG_LEVEL
          value: {{ .Values.ratelimit.logLevel | quote }}
        - name: REDIS_SOCKET_TYPE
          value: "tcp"
        - name: REDIS_URL
          value: "redis:6379"
        - name: RUNTIME_ROOT
          value: "/data"
        - name: RUNTIME_SUBDIRECTORY
          value: "ratelimit"
        - name: RUNTIME_WATCH_ROOT
          value: "false"
        - name: RUNTIME_IGNOREDOTFILES
          value: "true"
        - name: CONFIG_TYPE
          value: "FILE"
        - name: GRPC_MAX_CONNECTION_AGE
          value: {{ .Values.ratelimit.grpcMaxConnectionAge | quote }}
        - name: GRPC_MAX_CONNECTION_AGE_GRACE
          value: {{ .Values.ratelimit.grpcMaxConnectionAgeGrace | quote }}
        resources:
{{ toYaml .Values.ratelimit.resources | nindent 10 }}
        volumeMounts:
        - name: config-volume
          mountPath: /data/ratelimit/config
      volumes:
      - name: config-volume
        configMap:
          name: ratelimit-config
