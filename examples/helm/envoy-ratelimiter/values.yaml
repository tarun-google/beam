# Default values for envoy-ratelimit.
# This is a YAML-formatted file.

# Namespace to deploy into
namespace: envoy-ratelimiter

# Rate Limiter Service Configuration
ratelimit:
  image: "envoyproxy/ratelimit:e9ce92cc"
  replicas: 1
  logLevel: "info"
  grpcMaxConnectionAge: "5m"
  grpcMaxConnectionAgeGrace: "1m"
  resources:
    requests:
      cpu: "150m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# Redis Configuration
redis:
  image: "redis:6.2-alpine"
  resources:
    requests:
      cpu: "250m"
      memory: "128Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"

# Autoscaling Configuration
minReplicas: 1
maxReplicas: 5
hpaCpuTargetPercentage: 75
hpaMemoryTargetPercentage: 75

# Enable metrics export to Google Cloud Monitoring
enableMetrics: true

# Static Internal IP for Load Balancer (Optional)
# If provided, the LoadBalancer will use this specific IP address.
# If empty, an ephemeral internal IP will be allocated.
loadBalancerIP: "10.0.0.56"

# Custom Rate Limit Configuration (YAML string)
# Override this with your specific limits in your custom values file.
configYaml: |
  domain: mongo_cps
  descriptors:
    - key: database
      value: users
      rate_limit:
        unit: second
        requests_per_unit: 500
